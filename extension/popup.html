<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Review RAG Assistant</title>
    <link rel="stylesheet" href="popup.css" />
  </head>

  <body>
    <main class="app">
      <header class="app-header">
        <h1>Review RAG Assistant</h1>
        <p>Index visible reviews from this page, then ask questions about them.</p>
      </header>

      <section class="actions">
        <button id="createSessionBtn" type="button">
          Analyse Current Reviews
        </button>

        <button id="refreshSessionBtn" class="secondary-button" type="button" disabled>
          Refresh Session
        </button>
      </section>

      <section id="loading" class="loading hidden">
        <div class="spinner"></div>
        <p id="loadingText">Working...</p>
      </section>

      <section id="errorBox" class="error hidden"></section>

      <section id="emptyState" class="empty-state hidden">
        <h2>No review text found</h2>
        <p>
          Try scrolling the page to load more reviews or comments, then index again.
        </p>
      </section>

      <section id="sessionPanel" class="session-panel hidden">
        <h2>Session Ready</h2>
        <p id="sessionStatus"></p>
      </section>

      <section id="dashboard" class="dashboard hidden">
        <div class="metric-grid">
          <div class="metric-card">
            <span>Reviews</span>
            <strong id="totalReviews">0</strong>
          </div>

          <div class="metric-card">
            <span>Positive</span>
            <strong id="positivePct">0%</strong>
          </div>

          <div class="metric-card">
            <span>Negative</span>
            <strong id="negativePct">0%</strong>
          </div>
        </div>
      </section>

      <section id="suggestions" class="suggestions hidden">
        <h2>Suggested questions</h2>

        <button type="button" data-question="What are the main customer complaints?">
          Main complaints
        </button>

        <button type="button" data-question="What do customers like most?">
          What people like
        </button>

        <button type="button" data-question="Summarize the pros and cons.">
          Pros and cons
        </button>

        <button type="button" data-question="Are there delivery, packaging, or shipping issues?">
          Delivery issues
        </button>

        <button type="button" data-question="Are there quality or durability issues?">
          Quality issues
        </button>
      </section>

      <section id="chatPanel" class="chat-panel hidden">
        <div class="chat-heading">
          <h2>Review chat</h2>
          <span class="chat-status">Grounded</span>
        </div>

        <div id="chatMessages" class="chat-messages" aria-live="polite"></div>

        <form id="chatForm" class="chat-form">
          <textarea
            id="questionInput"
            rows="2"
            aria-label="Ask about the visible reviews"
            placeholder="Ask about the visible reviews..."
            disabled
          ></textarea>

          <button id="sendBtn" type="submit" disabled>
            Send
          </button>
        </form>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
